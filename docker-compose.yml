version: "3.9"

services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: printverse
      POSTGRES_USER: printverse
      POSTGRES_PASSWORD: printverse
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports: ["5432:5432"]

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]

  web:
    build: .
    command: >
      sh -c "python manage.py migrate &&
             python manage.py runserver 0.0.0.0:8000"
    env_file: .env
    volumes: [".:/app"]
    ports: ["8000:8000"]
    depends_on: [db, redis]

  celery:
    build: .
    command: celery -A printverse worker -l info
    env_file: .env
    volumes: [".:/app"]
    depends_on: [db, redis]

  celery-beat:
    build: .
    command: celery -A printverse beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    env_file: .env
    volumes: [".:/app"]
    depends_on: [db, redis]

volumes:
  pgdata:

